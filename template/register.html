{% extends "base.html" %}
{% load static %}
{% block title %}
Регистрация
{% endblock %}

{% block content %}

<h1>Регистрация</h1>

<form method="post" action="{% url 'register' %}">
    {% csrf_token %}

    {% for field in form %}

    <div class="mb-3">
        <label for='{{ field.id_for_label }}' class="form-label">{{ field.label_tag }}</label>
        {{ field }}
    </div>
    {% if field.errors %}
    <div class="alert alert-danger" role="alert">
        {{ field.errors }}
    </div>
    {% endif %}

    {% endfor %}

    <button type="submit" class="btn btn-info" style="margin-top: 10px">Зарегистрироваться</button>


</form>
<a href="{% url 'login' %}">Уже есть аккаунт? Войдите</a>
{% endblock %}
