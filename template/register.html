{% extends "base.html" %}
{% load static %}

{% block title %}
Регистрация
{% endblock %}

{% block content %}

<div class="d-flex justify-content-center align-items-center py-5">
    <div style="width: 529px;">
        <h1 class="text-center mb-4">Регистрация</h1>

        <form method="post" action="{% url 'register' %}" style="width: 529px; display: flex; flex-direction: column; gap: 64px;">
            {% csrf_token %}

            {% for field in form %}
            <div style="width: 529px; height: 127px; gap: 8px; display: flex; flex-direction: column;">
                <label for="{{ field.id_for_label }}" style="width: 529px; height: 39px; font-family: Inter, sans-serif; font-weight: 400; font-size: 32px; line-height: 100%; color: #000000; margin-bottom: 8px;">
                    {{ field.label }}
                </label>
                <div style="position: relative;">
                    {{ field }}
                    {% if field.errors %}
                    <div class="text-danger small mt-1" style="position: absolute; white-space: nowrap;">
                        {% for error in field.errors %}
                            {{ error }}
                        {% endfor %}
                    </div>
                    {% endif %}
                </div>
            </div>
            {% endfor %}

            <div class="d-flex justify-content-center">
                <button type="submit" class="btn" style="width: 217px; height: 73px; padding: 20px 24px; border: none; border-radius: 0; background-color: #07331B; color: white; font-family: Roboto, sans-serif; font-weight: 600; font-size: 28px; line-height: 100%; text-align: center;">
                    Регистрация
                </button>
            </div>
        </form>
    </div>
</div>

{% endblock %}
