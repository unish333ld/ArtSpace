{% extends "base.html" %}
{% load static %}
{% block title %}
Отклонение мастер-класса {{ masterclass.name }}
{% endblock %}

{% block content %}

<div class="container-fluid d-flex justify-content-center align-items-center py-5">
    <div class="col-12 col-md-8 col-lg-6" style="max-width: 529px; padding: 0 20px;">
        <h1 style="font-family: 'Libre Baskerville', serif; font-weight: 700; font-size: 48px; line-height: 100%; letter-spacing: -0.02em; color: #000000; text-align: center; margin-bottom: 30px;">Укажите причину отклонения</h1>
        <p style="font-family: Roboto, sans-serif; font-weight: 300; font-size: 24px; line-height: 120%; color: #145834; text-align: center; margin-bottom: 40px;">Мастер-класс: {{ masterclass.name }}</p>

        <form method="post" action="{% url 'cancel_order' masterclass.pk %}" style="width: 529px; display: flex; flex-direction: column; gap: 64px;">
            {% csrf_token %}
            <div style="width: 529px; display: flex; flex-direction: column; gap: 8px;">
                <label for="id_comment" style="width: 529px; font-family: Inter, sans-serif; font-weight: 400; font-size: 32px; line-height: 100%; color: #000000; margin-bottom: 8px;">
                    Причина отмены:
                </label>
                <input class="form-control" type="text" name="comment" autofocus maxlength="150" required id="id_comment" style="width: 529px; height: 80px; border-radius: 8px; background: rgba(255, 255, 255, 0.4); border: none; box-shadow: 0px 4px 4px 0px rgba(0, 0, 0, 0.25); padding: 10px;">
            </div>

            <div class="d-flex justify-content-center">
                <button type="submit" style="width: 217px; height: 73px; padding: 20px 24px; border: none; border-radius: 0; background-color: #07331B; color: white; font-family: Roboto, sans-serif; font-weight: 600; font-size: 28px; line-height: 100%; text-align: center;">
                    Отклонить
                </button>
            </div>
        </form>
    </div>
</div>

{% endblock %}
